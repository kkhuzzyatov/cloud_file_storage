server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/storage
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:/migrations/master.xml